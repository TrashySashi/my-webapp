<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
    .container { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 500px; padding: 32px; }
    h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 0.9rem; }
    .input-row { display: flex; gap: 10px; margin-bottom: 28px; }
    input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6c63ff; }
    button.add-btn { background: #6c63ff; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background 0.2s; }
    button.add-btn:hover { background: #574fd6; }
    .stats { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat { background: #f8f9ff; border-radius: 10px; padding: 10px 16px; flex: 1; text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: #6c63ff; }
    .stat-label { font-size: 0.75rem; color: #888; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item:last-child { border-bottom: none; }
    .todo-text { flex: 1; font-size: 1rem; color: #333; transition: all 0.2s; }
    .todo-text.done { text-decoration: line-through; color: #aaa; }
    .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #6c63ff; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
    .check-btn.done { background: #6c63ff; color: white; }
    .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.2rem; transition: color 0.2s; }
    .del-btn:hover { color: #ff4d4d; }
    .empty { text-align: center; color: #bbb; padding: 30px 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>
    <p class="subtitle">Deployed with ArgoCD on Kubernetes</p>
    <div class="input-row">
      <input id="todoInput" type="text" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done</div></div>
      <div class="stat"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>
  <script>
    async function fetchTodos() {
      const res = await fetch('/api/todos');
      const todos = await res.json();
      renderTodos(todos);
    }
    function renderTodos(todos) {
      const list = document.getElementById('todoList');
      document.getElementById('totalCount').textContent = todos.length;
      document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
      document.getElementById('pendingCount').textContent = todos.filter(t => !t.done).length;
      if (todos.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>';
        return;
      }
      list.innerHTML = todos.map(t => `
        <li class="todo-item">
          <button class="check-btn ${t.done ? 'done' : ''}" onclick="toggleTodo(${t.id})">${t.done ? '✓' : ''}</button>
          <span class="todo-text ${t.done ? 'done' : ''}">${t.text}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})">✕</button>
        </li>
      `).join('');
    }
    async function addTodo() {
      const input = document.getElementById('todoInput');
      if (!input.value.trim()) return;
      await fetch('/api/todos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text: input.value.trim() }) });
      input.value = '';
      fetchTodos();
    }
    async function toggleTodo(id) {
      await fetch(`/api/todos/${id}`, { method: 'PATCH' });
      fetchTodos();
    }
    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, { method: 'DELETE' });
      fetchTodos();
    }
    document.getElementById('todoInput').addEventListener('keypress', e => { if (e.key === 'Enter') addTodo(); });
    fetchTodos();
  </script>
</body>
</html>
